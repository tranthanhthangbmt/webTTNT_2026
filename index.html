<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Trí tuệ nhân tạo - Đại học Đông Á</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Tài liệu môn học Trí tuệ nhân tạo - Artificial Intelligence: A Modern Approach">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Theme: Modern UI using Docsify Themeable -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <style>
    :root {
      --theme-color: #1a73e8;
      --base-font-size: 16px;
      --sidebar-width: 300px;
    }

    .markdown-section {
      max-width: 1000px;
    }

    /* Style for iframe PDF to ensure it scales correctly */
    .pdf-container {
      width: 100%;
      height: 80vh;
      border: none;
    }

    /* Remove scrollbars from inline MathJax equations and inline code */
    .markdown-section p *,
    .markdown-section li * {
      overflow: visible !important;
    }

    .math,
    .math *,
    mjx-container,
    mjx-container * {
      overflow: visible !important;
    }

    mjx-container[display="true"] {
      overflow-x: auto !important;
      overflow-y: hidden !important;
    }
  </style>
</head>

<body>
  <div id="app">Đang tải nội dung môn học...</div>

  <script>
    window.$docsify = {
      name: 'Trí Tuệ Nhân Tạo',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: 'Tìm kiếm',
        noData: 'Không tìm thấy kết quả!',
        depth: 3
      },
      tabs: {
        persist: true,
        sync: false,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      }
    }
  </script>

  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

  <!-- Code Highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>

  <!-- Tabs Plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>

  <!-- Math Equation Support (MathJax + docsify-latex) -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        tags: 'all'
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-svg.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-latex@0"></script>

</body>

</html>
